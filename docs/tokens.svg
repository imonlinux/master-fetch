<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="820" height="380" fill="#f7f5f0"/>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#28335a">MCP tool count = tokens burned on every call</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#5a6478">fewer tools, less schema overhead per turn</text>

  <!-- bars: 1 unit = 9px, origin x=150 -->
  <g font-size="14">
    <!-- Hound (highlighted) -->
    <text x="142" y="104" text-anchor="end" fill="#28335a" font-weight="700">Hound</text>
    <rect x="150" y="88" width="54" height="26" rx="4" fill="#e89213"/>
    <text x="212" y="106" fill="#9a6210" font-weight="700">6</text>

    <!-- Firecrawl -->
    <text x="142" y="148" text-anchor="end" fill="#5a6478">Firecrawl</text>
    <rect x="150" y="132" width="108" height="26" rx="4" fill="#c7ccd6"/>
    <text x="266" y="150" fill="#5a6478">12</text>

    <!-- Jina -->
    <text x="142" y="192" text-anchor="end" fill="#5a6478">Jina</text>
    <rect x="150" y="176" width="171" height="26" rx="4" fill="#c7ccd6"/>
    <text x="329" y="194" fill="#5a6478">19</text>

    <!-- Bright Data (capped at 60+) -->
    <text x="142" y="236" text-anchor="end" fill="#5a6478">Bright Data</text>
    <rect x="150" y="220" width="540" height="26" rx="4" fill="#c7ccd6"/>
    <text x="698" y="238" fill="#5a6478">60+</text>
  </g>

  <!-- axis baseline -->
  <line x1="150" y1="262" x2="700" y2="262" stroke="#b8b8b8" stroke-width="1"/>

  <!-- callout -->
  <rect x="60" y="290" width="700" height="64" rx="10" fill="#eef2f9" stroke="#28335a" stroke-width="1.5"/>
  <text x="410" y="316" text-anchor="middle" font-size="15" font-weight="700" fill="#28335a">Hound: 6 tools · ~2.1K tokens tools/list</text>
  <text x="410" y="338" text-anchor="middle" font-size="13" fill="#5a6478">typical MCP server dumps 3-5K tokens just to exist · Hound keeps it lean</text>
</svg>
