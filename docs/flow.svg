<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#28335a"/>
    </marker>
    <marker id="arrowteal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#19a7a0"/>
    </marker>
  </defs>
  <rect width="820" height="560" fill="#f7f5f0"/>

  <!-- title -->
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#28335a">smart_fetch pipeline</text>

  <!-- boxes -->
  <g font-size="15" fill="#28335a">
    <rect x="60" y="48" width="480" height="50" rx="10" fill="#ffffff" stroke="#28335a" stroke-width="2"/>
    <text x="300" y="78" text-anchor="middle">smart_fetch(url)</text>

    <rect x="60" y="128" width="480" height="50" rx="10" fill="#ffffff" stroke="#28335a" stroke-width="2"/>
    <text x="300" y="158" text-anchor="middle">cache + robots.txt check</text>

    <rect x="60" y="208" width="480" height="50" rx="10" fill="#ffffff" stroke="#28335a" stroke-width="2"/>
    <text x="300" y="238" text-anchor="middle">HTTP · curl_cffi · ~1s</text>

    <rect x="60" y="288" width="480" height="50" rx="10" fill="#eaf7f5" stroke="#19a7a0" stroke-width="2"/>
    <text x="300" y="318" text-anchor="middle" fill="#15756f">Stealthy · Patchright · Cloudflare solve</text>

    <rect x="60" y="368" width="480" height="50" rx="10" fill="#ffffff" stroke="#28335a" stroke-width="2"/>
    <text x="300" y="398" text-anchor="middle">extract → markdown · tables · metadata · focus · OCR</text>

    <rect x="60" y="448" width="480" height="50" rx="10" fill="#fdf0d9" stroke="#e89213" stroke-width="2"/>
    <text x="300" y="478" text-anchor="middle" fill="#9a6210">agent response · content_ok · next_action · summary</text>
  </g>

  <!-- main arrows -->
  <g stroke="#28335a" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="300" y1="98"  x2="300" y2="126"/>
    <line x1="300" y1="178" x2="300" y2="206"/>
    <line x1="300" y1="258" x2="300" y2="286"/>
    <line x1="300" y1="338" x2="300" y2="366"/>
    <line x1="300" y1="418" x2="300" y2="446"/>
  </g>

  <!-- escalation label between HTTP and Stealthy -->
  <text x="312" y="278" font-size="12" fill="#15756f">blocked / JS-shell / 403 / 503 → escalate</text>

  <!-- PDF side branch -->
  <g>
    <path d="M540,393 C600,393 600,300 640,300" stroke="#19a7a0" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arrowteal)"/>
    <rect x="640" y="272" width="160" height="58" rx="10" fill="#eaf7f5" stroke="#19a7a0" stroke-width="2"/>
    <text x="720" y="296" text-anchor="middle" font-size="14" fill="#15756f">PDF → pdfplumber</text>
    <text x="720" y="316" text-anchor="middle" font-size="12" fill="#15756f">OCR if scanned</text>
  </g>

  <!-- crawl side note -->
  <g>
    <path d="M540,73 C620,73 640,120 640,140" stroke="#28335a" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
    <rect x="640" y="112" width="160" height="58" rx="10" fill="#ffffff" stroke="#28335a" stroke-width="2"/>
    <text x="720" y="136" text-anchor="middle" font-size="14" fill="#28335a">smart_crawl(url)</text>
    <text x="720" y="156" text-anchor="middle" font-size="12" fill="#28335a">BFS same-domain walk</text>
  </g>
</svg>
