name: Feature request
description: Suggest a new capability or improvement for Hound
title: "[Feature] "
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        Hound deliberately stays lean: 6 tools, ~3K tokens, no bloat. Before
        requesting a feature, check whether the current tools already do it
        (e.g. `smart_fetch` with `css_selector` / `focus` / `actions`, or
        `smart_crawl` with `sitemap` / `crawl_urls`). A re-label of an existing
        capability is not a new feature.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A concrete task the current tools can't do, or do poorly.
      placeholder: "I tried to ... but Hound ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you want to happen?
      description: The behavior you'd expect, concretely.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What did you try instead?
      description: Which existing tool/option did you use, and why wasn't it enough?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Hound version
      description: Run `hound --version`
      placeholder: "9.0.0"
    validations:
      required: false
