name: "Hound MCP Server"
description: "Hound is a research-focused web fetcher with smart extraction, caching, and anti-bot capabilities. Runs as an HTTP MCP server for AI agents."
version: "12.3.0"
slug: "hound_mcp"
arch:
  - aarch64
  - amd64
url: "https://github.com/dondai1234/master-fetch"
init: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "MCP server endpoint"
webui: "http://[HOST]:[PORT:8765]/mcp"
watchdog: "http://[HOST]:[PORT:8765]/mcp"
options:
  log_level: "info"
  cache_ttl: 3600
  max_results: 10
schema:
  log_level: "list(info|debug|warning|error)"
  cache_ttl: "int(0,86400)"
  max_results: "int(1,50)"
environment:
  PYTHONUNBUFFERED: "1"
  PIP_NO_CACHE_DIR: "1"
  NO_COLOR: "1"
  PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
stage: "stable"
backup: "hot"
